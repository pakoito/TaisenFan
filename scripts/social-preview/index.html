<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<title>TaisenFan social preview</title>
		<link
			href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Serif:wght@400;700;900&family=Noto+Serif+SC:wght@700;900&display=swap"
			rel="stylesheet"
		/>
		<style>
			:root {
				--surface: #0e0e0e;
				--surface-mid: #131313;
				--gold: #ffd700;
				--gold-dim: #e9c400;
				--gold-muted: #b8a340;
				--cinnabar: #ad0224;
				--cinnabar-light: #d4163c;
				--text-muted: #d0c6ab;
				--text-faint: #999077;
				--text-dim: #666050;
			}

			* {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}

			html,
			body {
				width: 1280px;
				height: 640px;
				background: var(--surface);
				color: var(--text-muted);
				font-family: "Inter", system-ui, sans-serif;
				overflow: hidden;
			}

			.canvas {
				position: relative;
				width: 1280px;
				height: 640px;
				background: radial-gradient(
					ellipse at 50% 45%,
					#1a1a1a 0%,
					var(--surface) 65%,
					#070707 100%
				);
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				padding: 80px;
			}

			/* Decorative cinnabar seal mark in background */
			.seal {
				position: absolute;
				top: 70px;
				right: 90px;
				width: 110px;
				height: 110px;
				background: var(--cinnabar);
				display: flex;
				align-items: center;
				justify-content: center;
				font-family: "Noto Serif SC", "Noto Serif", serif;
				font-weight: 900;
				font-size: 64px;
				color: var(--gold);
				transform: rotate(-3deg);
				box-shadow: 0 6px 24px rgba(173, 2, 36, 0.4);
				letter-spacing: -2px;
			}

			.seal::after {
				content: "";
				position: absolute;
				inset: 6px;
				border: 2px solid var(--gold);
				opacity: 0.5;
				pointer-events: none;
			}

			/* Stamp-style badge on the left for balance */
			.seal-left {
				position: absolute;
				top: 86px;
				left: 90px;
				display: flex;
				flex-direction: column;
				align-items: flex-start;
				gap: 6px;
				font-family: "Inter", sans-serif;
				color: var(--gold-muted);
				text-transform: uppercase;
			}

			.seal-left .badge {
				font-weight: 900;
				font-size: 16px;
				letter-spacing: 0.35em;
				padding: 6px 12px;
				border: 2px solid var(--gold-muted);
				background: rgba(255, 215, 0, 0.04);
			}

			.seal-left .sub {
				font-weight: 700;
				font-size: 11px;
				letter-spacing: 0.4em;
				color: var(--text-dim);
				padding-left: 4px;
			}

			.eyebrow {
				font-family: "Inter", sans-serif;
				font-weight: 700;
				color: var(--gold-dim);
				font-size: 18px;
				letter-spacing: 0.55em;
				text-transform: uppercase;
				margin-bottom: 22px;
				text-shadow: 0 0 16px rgba(255, 215, 0, 0.2);
			}

			.title {
				font-family: "Noto Serif SC", "Noto Serif", serif;
				font-weight: 900;
				font-size: 168px;
				line-height: 1;
				color: var(--gold);
				letter-spacing: -4px;
				display: flex;
				gap: 4px;
				text-shadow: 0 4px 20px rgba(0, 0, 0, 0.8);
			}

			.title .ten {
				color: var(--cinnabar-light);
				margin-left: 12px;
			}

			.divider {
				margin-top: 28px;
				margin-bottom: 24px;
				width: 340px;
				height: 3px;
				background: linear-gradient(
					to right,
					transparent 0%,
					var(--cinnabar) 30%,
					var(--cinnabar-light) 50%,
					var(--cinnabar) 70%,
					transparent 100%
				);
			}

			.brand {
				display: flex;
				align-items: baseline;
				gap: 14px;
				margin-bottom: 22px;
			}

			.brand .marker {
				font-family: "Noto Serif SC", "Noto Serif", serif;
				font-weight: 900;
				font-size: 44px;
				color: var(--cinnabar-light);
				letter-spacing: -1px;
			}

			.brand .fan {
				font-family: "Inter", sans-serif;
				font-weight: 900;
				font-size: 42px;
				color: var(--gold-dim);
				letter-spacing: 0.18em;
			}

			.tagline {
				font-family: "Noto Serif", serif;
				font-weight: 400;
				font-style: italic;
				font-size: 24px;
				color: var(--text-muted);
				letter-spacing: 0.02em;
				text-align: center;
				max-width: 720px;
				line-height: 1.4;
			}

			.footer {
				position: absolute;
				left: 0;
				right: 0;
				bottom: 36px;
				display: flex;
				justify-content: center;
				align-items: center;
				gap: 16px;
				font-family: "Inter", sans-serif;
				font-size: 14px;
				color: var(--text-dim);
				text-transform: uppercase;
				letter-spacing: 0.3em;
			}

			.footer .dot {
				width: 4px;
				height: 4px;
				background: var(--text-dim);
				border-radius: 50%;
			}

			.footer .accent {
				color: var(--gold-muted);
			}

			/* Subtle border frame */
			.frame {
				position: absolute;
				inset: 22px;
				border: 1px solid rgba(184, 163, 64, 0.18);
				pointer-events: none;
			}
		</style>
	</head>
	<body>
		<div class="canvas">
			<div class="frame"></div>

			<div class="seal-left">
				<div class="badge">Nintendo DS</div>
			</div>
			<div class="seal">天</div>

			<div class="eyebrow">English Translation Patch</div>

			<div class="title">
				<span>三国志大戦</span><span class="ten">天</span>
			</div>

			<div class="divider"></div>

			<div class="brand">
				<span class="marker">大戦</span>
				<span class="fan">FAN</span>
			</div>

			<div class="tagline">
				Sangokushi Taisen Ten — fan translation, card database, and live cartridge patcher
			</div>

			<div class="footer">
				<span>github.com/pakoito/TaisenFan</span>
				<span class="dot"></span>
				<span class="accent">pakoito.github.io/TaisenFan</span>
			</div>
		</div>
	</body>
</html>
